<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resultado do Diagnóstico | Telluna</title>

<style>
:root{
--green:#0F2E2A;
--green2:#0B2522;
--gold:#C6A85A;
--text:#F5F1E8;
--muted:rgba(255,255,255,.8);
--line:rgba(255,255,255,.14);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,var(--green),var(--green2));
color:var(--text);
}

.page{
max-width:900px;
margin:auto;
padding:60px 20px;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:20px;
}

.score{
font-size:64px;
font-weight:900;
color:var(--gold);
margin:30px 0;
}

.card{
background:rgba(255,255,255,.06);
border:1px solid var(--line);
border-radius:20px;
padding:30px;
margin-top:20px;
}

.stage{
font-size:32px;
margin-bottom:15px;
}

.desc{
font-size:18px;
line-height:1.7;
color:var(--muted);
}

.plan{
margin-top:20px;
font-size:16px;
color:var(--muted);
}

.cta{
margin-top:30px;
}

.cta button{
width:100%;
padding:18px;
font-size:20px;
font-weight:900;
border:none;
border-radius:12px;
background:var(--gold);
color:#0B2522;
cursor:pointer;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.6}
100%{opacity:1}
}
</style>
</head>

<body>

<div class="page">

<h1>Seu diagnóstico está pronto</h1>

<div class="score" id="score">--/60</div>

<div class="card">
<div class="stage" id="stage"></div>
<div class="desc" id="desc"></div>

<div class="plan" id="plan"></div>
</div>

<div class="cta">
<button id="btn">Solicitar consultoria</button>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const answers = [];
for (let i = 1; i <= 15; i++) {
answers.push(Number(params.get(`q${i}`) || 0));
}

const total = answers.reduce((sum, item) => sum + item, 0);

function getStage(score){

if(score <= 20){
return {
stage:"Empresa desorganizada",
desc:"Hoje sua empresa sobrevive mais no esforço do que na estratégia. Você resolve problemas todos os dias, mas dificilmente tem clareza do que realmente está construindo.\n\nVocê consegue enxergar crescimento consistente nesse cenário atual — ou sente que está sempre apagando incêndios?",
plan:"O próximo passo é estruturar base, processos e clareza de direção antes de pensar em crescimento."
}
}

if(score <= 40){
return {
stage:"Empresa em estruturação",
desc:"Você já saiu do caos inicial, mas ainda enfrenta travas que impedem crescimento consistente.\n\nSua empresa até evolui, mas depende demais de você. Se você parar hoje, o negócio continua — ou trava?",
plan:"Agora é o momento de organizar gestão, indicadores e reduzir dependência do dono."
}
}

return {
stage:"Empresa estruturada",
desc:"Sua empresa já tem base sólida e sinais claros de maturidade.\n\nMas a pergunta agora é: você está crescendo no ritmo que poderia — ou ainda existe potencial desperdiçado?",
plan:"O foco agora é escalar com eficiência, aumentar margem e fortalecer liderança."
}
}

const result = getStage(total);

document.getElementById("score").innerText = total + "/60";
document.getElementById("stage").innerText = result.stage;
document.getElementById("desc").innerText = result.desc;
document.getElementById("plan").innerText = result.plan;

const mensagem = encodeURIComponent(
`Olá, acabei de finalizar o diagnóstico Telluna com pontuação ${total}/60 (${result.stage}) e quero uma consultoria.`
);

document.getElementById("btn").onclick = () => {
window.open(`https://wa.me/5549999447624?text=${mensagem}`);
};
</script>

</body>
</html>
