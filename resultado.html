<script>
const params = new URLSearchParams(window.location.search);

let total = 0;
let respostasRecebidas = 0;

for(let i=1;i<=15;i++){
  const valor = params.get("q"+i);

  if(valor !== null && valor !== ""){
    const numero = Number(valor);

    if(!isNaN(numero)){
      total += numero;
      respostasRecebidas++;
    }
  }
}

/* DEBUG IMPORTANTE */
console.log("Total calculado:", total);
console.log("Respostas recebidas:", respostasRecebidas);

/* ⚠️ ALERTA SE ALGO ESTIVER ERRADO */
if(respostasRecebidas < 15){
  console.warn("Nem todas as respostas foram recebidas corretamente.");
}

/* DIAGNÓSTICO */
function getData(score){

if(score <= 20){
return {
stage:"Empresa desorganizada",
desc:`
<p>Hoje sua empresa depende mais de esforço do que de estratégia.</p>
<p>Enquanto outras empresas estruturam gestão e crescem com previsibilidade, você ainda resolve problemas todos os dias sem clareza real.</p>
<p>Se nada mudar, você continuará exatamente onde está — enquanto outros avançam.</p>
<p>A Telluna utiliza um método estruturado para tirar empresas desse ciclo.</p>
<p><strong>Para empresas que precisam organizar a base da gestão, sair do improviso e começar a tomar decisões com clareza.</strong></p>
`,
plan:"Plano Essencial",
list:[
"✔ Diagnóstico dos principais gargalos",
"✔ Estruturação inicial de prioridades",
"✔ Definição do que realmente importa",
"✔ Primeira rotina de decisão",
"✔ 1 sessão estratégica com o gestor"
]
}
}

if(score <= 40){
return {
stage:"Empresa em estruturação",
desc:`
<p>Sua empresa já tem operação, mas ainda não está estruturada para crescer.</p>
<p>Sem processos e indicadores claros, o crescimento fica travado.</p>
<p><strong>Você está no ponto de virada entre operar e crescer.</strong></p>
<p><strong>Para empresas que precisam estruturar processos, indicadores e decisões para crescer com previsibilidade.</strong></p>
`,
plan:"Plano Estruturado",
list:[
"✔ Estruturação de processos-chave",
"✔ Definição de indicadores (KPIs)",
"✔ Rotina de acompanhamento",
"✔ Plano de ação estratégico",
"✔ Acompanhamento contínuo"
]
}
}

return {
stage:"Empresa estruturada",
desc:`
<p>Você já construiu uma base sólida.</p>
<p>Agora o desafio é manter consistência e evoluir com estratégia.</p>
<p><strong>Empresas que crescem de verdade não param de ajustar.</strong></p>
<p><strong>Para empresas que precisam consolidar gestão, manter consistência e evoluir com segurança.</strong></p>
`,
plan:"Plano Recorrente",
list:[
"✔ Diagnóstico contínuo da operação",
"✔ Revisão constante de metas",
"✔ Ajustes estratégicos recorrentes",
"✔ Suporte direto à tomada de decisão",
"✔ Evolução de indicadores",
"✔ Acompanhamento próximo"
]
}
}

}

const data = getData(total);

/* RENDER */
document.getElementById("score").innerText = total+"/60";
document.getElementById("stage").innerText = data.stage;
document.getElementById("desc").innerHTML = data.desc;
document.getElementById("planTitle").innerText = data.plan;

const ul = document.getElementById("planList");
ul.innerHTML="";
data.list.forEach(item=>{
  const li=document.createElement("li");
  li.innerText=item;
  ul.appendChild(li);
});

/* BOTÕES */
function go(){
  window.open("https://wa.me/5516993735556");
}

document.getElementById("btn").onclick=go;
document.getElementById("topBtn").onclick=go;

</script>
