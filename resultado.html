<script>
const params = new URLSearchParams(window.location.search);

let total = 0;
let hasData = false;

for(let i=1;i<=15;i++){
const val = Number(params.get("q"+i));
if(val){
total += val;
hasData = true;
}
}

// fallback (se não vier dados)
if(!hasData){
total = 12; // valor padrão pra teste
}

function getData(score){

if(score<=20){
return {
stage:"Empresa desorganizada",
desc:"Sua empresa está travada no operacional e sem clareza de direção.",
criteria:[
"Falta de processos definidos",
"Decisões sem base clara",
"Alta dependência do gestor",
"Ausência de prioridades estruturadas"
],
plan:"Plano Essencial",
planDesc:"Organização da base e saída do improviso.",
planDetail:"Plano focado em estruturar base e decisões."
}
}

if(score<=40){
return {
stage:"Empresa em estruturação",
desc:"Sua empresa cresce, mas ainda com desorganização interna.",
criteria:[
"Processos inconsistentes",
"Indicadores pouco claros",
"Dependência do dono"
],
plan:"Plano Estratégico",
planDesc:"Estruturação para crescimento previsível.",
planDetail:"Plano focado em crescimento estruturado."
}
}

return {
stage:"Empresa estruturada",
desc:"Sua empresa já tem base, mas pode evoluir.",
criteria:[
"Falta de escala",
"Decisões estratégicas pontuais"
],
plan:"Plano Transformação",
planDesc:"Evolução contínua.",
planDetail:"Plano focado em escala."
}
}

const data = getData(total);

// FORÇA PREENCHIMENTO
document.getElementById("score").innerText = total+"/60";
document.getElementById("stage").innerText = data.stage;
document.getElementById("desc").innerText = data.desc;
document.getElementById("planTitle").innerText = data.plan;
document.getElementById("planDesc").innerText = data.planDesc;
document.getElementById("planDetail").innerHTML = data.planDetail;

// CRITÉRIOS
const criteriaEl = document.getElementById("criteria");
criteriaEl.innerHTML = "";
data.criteria.forEach(c=>{
const div=document.createElement("div");
div.innerText="✔ "+c;
criteriaEl.appendChild(div);
});

// BOTÕES
function go(){
window.open("https://wa.me/5549999447624");
}

document.getElementById("btn").onclick=go;
document.getElementById("topBtn").onclick=go;
</script>
